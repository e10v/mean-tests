output = "reports/large-scale.md"
buckets = [10, 20, 50, 100]

[simulation]
rng = 42
n_simulations = 10_000
batch_size = 5
max_workers = 0  # If less or equal to zero then the default is used

[sample]
alpha = 0.01  # Type I error rate for sample size calculation and estimation of power
power = 0.8  # Reference power for sample size calculation
ratio = 1.0  # Treatment-to-control allocation ratio
rel_diff_default = 0.02  # Reference uplift for sample size calculation in A/A simulations
top_users = 0.2  # Top X share of users
top_value = 0.8  # Create Y share of value

[[treatments]]
name = "A/A 0%: +2% top, -2% bottom (relative to total)"
rel_diff_top = 0.02
rel_diff_bottom = -0.02

[[treatments]]
name = "A/A 0%: -2% top, +2% bottom (relative to total)"
rel_diff_top = -0.02
rel_diff_bottom = 0.02

[[treatments]]
name = "A/B +2%: +1.6% top, +0.4% bottom (relative to total)"
rel_diff_top = 0.016
rel_diff_bottom = 0.004

[[treatments]]
name = "A/B +2%: +2% top, 0% bottom (relative to total)"
rel_diff_top = 0.02
rel_diff_bottom = 0.0

[[treatments]]
name = "A/B +2%: 0% top, +2% bottom (relative to total)"
rel_diff_top = 0.0
rel_diff_bottom = 0.02

[[user_tests]]
name = "Welch's t-test"
path = "tea_tasting.Mean"
args = [ "value" ]
kwargs = { use_t = true, equal_var = false }

[[user_tests]]
name = "Student's t-test"
path = "tea_tasting.Mean"
args = [ "value" ]
kwargs = { use_t = true, equal_var = true }

[[user_tests]]
name = "Z-test (unpooled)"
path = "tea_tasting.Mean"
args = [ "value" ]
kwargs = { use_t = false, equal_var = false }

[[user_tests]]
name = "Mann–Whitney U"
path = "tea_tasting.MannWhitneyU"
args = [ "value" ]
kwargs = { correction = true }

[[bucket_tests]]
name = "Welch's t-test"
path = "tea_tasting.RatioOfMeans"
args = [ "value", "users" ]
kwargs = { use_t = true, equal_var = false }

[[bucket_tests]]
name = "Student's t-test"
path = "tea_tasting.RatioOfMeans"
args = [ "value", "users" ]
kwargs = { use_t = true, equal_var = true }

[[bucket_tests]]
name = "Z-test (unpooled)"
path = "tea_tasting.RatioOfMeans"
args = [ "value", "users" ]
kwargs = { use_t = false, equal_var = false }

[[bucket_tests]]
name = "Mann–Whitney U"
path = "tea_tasting.MannWhitneyU"
args = [ "value_per_user" ]
kwargs = { correction = true }
