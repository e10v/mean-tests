output = "reports/mean-tests-20-80.md"

rng = 42
n_simulations = 10_000
alpha = 0.05  # Type I error rate
power = 0.8  # Reference power for sample size calculation
rel_diff_default = 0.05  # Reference uplift for sample size calculation in A/A simulations
buckets = [10, 20, 50, 100]

[control]
mean = 1.0
top_users = 0.2  # Top X share of users
top_value = 0.8  # Create Y share of value

[[treatments]]
name = "A/A 0%: +5% top, -5% bottom (relative to total)"
rel_diff_top = 0.05
rel_diff_bottom = -0.05

[[treatments]]
name = "A/A 0%: -5% top, +5% bottom (relative to total)"
rel_diff_top = -0.05
rel_diff_bottom = 0.05

[[treatments]]
name = "A/B +5%: +4% top, +1% bottom (relative to total)"
rel_diff_top = 0.04
rel_diff_bottom = 0.01

[[treatments]]
name = "A/B +5%: +5% top, 0% bottom (relative to total)"
rel_diff_top = 0.05
rel_diff_bottom = 0.0

[[treatments]]
name = "A/B +5%: 0% top, +5% bottom (relative to total)"
rel_diff_top = 0.0
rel_diff_bottom = 0.05

[[user_tests]]
name = "Welch's t-test"
path = "tea_tasting.Mean"
args = [ "value" ]
kwargs = { use_t = true, equal_var = false }

[[user_tests]]
name = "Mann–Whitney U"
path = "tea_tasting.MannWhitneyU"
args = [ "value" ]
kwargs = { correction = true }

[[bucket_tests]]
name = "Welch's t-test"
path = "tea_tasting.RatioOfMeans"
args = [ "value", "users" ]
kwargs = { use_t = true, equal_var = false }

[[bucket_tests]]
name = "Mann–Whitney U"
path = "tea_tasting.MannWhitneyU"
args = [ "value_per_user" ]
kwargs = { correction = true }
